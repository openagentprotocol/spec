name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Validate protocol schemas
        run: node scripts/validate-schemas.mjs

      - name: Validate example payloads
        run: node scripts/validate-examples.mjs

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git tag
        id: git_tag
        run: echo "tag=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci
        working-directory: ./website

      - name: Copy protocol artifacts to static
        run: node scripts/copy-protocol.mjs
        working-directory: ./website

      - name: Build SvelteKit site
        run: npm run build
        working-directory: ./website
        env:
          VITE_GIT_TAG: ${{ steps.git_tag.outputs.tag }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: website/build/

  docker-publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE=ghcr.io/${REPO_OWNER_LC}/spec:${{ github.sha }}
          docker build \
            --build-arg VITE_GIT_TAG=$(git describe --tags --always) \
            -t $IMAGE .
          docker push $IMAGE

      - name: Set image tag output
        id: image_tag
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=ghcr.io/${REPO_OWNER_LC}/spec:${{ github.sha }}" >> $GITHUB_OUTPUT

  update-iac:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: docker-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout IaC repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.IAC_REPO }}
          token: ${{ secrets.IAC_PAT }}
          ref: ${{ secrets.IAC_BRANCH }}

      - name: Update image tag in deployment
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          DEPLOY_FILE="${{ secrets.IAC_DEPLOY_PATH }}"
          sed -i 's|^\([[:space:]]*\)image:.*|\1image: ghcr.io/'"$REPO_OWNER_LC"'/spec:'"${{ github.sha }}"'|g' "$DEPLOY_FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.IAC_PAT }}
          commit-message: "Update OAP website image to ${{ github.ref_name }} (${{ github.sha }})"
          branch: update-oap-website-${{ github.ref_name }}
          base: ${{ secrets.IAC_BRANCH }}
          title: "Update OAP website image to ${{ github.ref_name }}"
          body: "Automated update of OAP website image tag to ${{ github.ref_name }} (commit ${{ github.sha }})."
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          signoff: true